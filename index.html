<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lagos Vibes Kitchen | Best Nigerian Restaurant 🍖</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* ==== CSS VARIABLES ==== */
        :root {
            --primary: #ff4757;
            --primary-dark: #d63031;
            --secondary: #ffa502;
            --secondary-dark: #e67e22;
            --dark: #1e272e;
            --dark-secondary: #2d3436;
            --light: #dfe6e9;
            --white: #ffffff;
            --off-white: #f5f6fa;
            --gray: #636e72;
            --gray-light: #b2bec3;
            --whatsapp: #25D366;
            --whatsapp-dark: #20bd5a;
            --success: #00b894;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: var(--off-white);
            color: var(--dark);
            line-height: 1.7;
            overflow-x: hidden;
        }

        html { scroll-behavior: smooth; }
        a { text-decoration: none; }
        img { max-width: 100%; }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* ===== BUTTONS ===== */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 28px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(255, 71, 87, 0.4);
        }

        .btn-outline {
            background: transparent;
            border: 2px solid white;
            color: white;
        }

        .btn-outline:hover {
            background: white;
            color: var(--dark);
        }

        /* ===== NAVBAR ===== */
        .navbar {
            background: rgba(255, 255, 255, 0.98);
            box-shadow: 0 2px 20px rgba(0,0,0,0.08);
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            backdrop-filter: blur(10px);
        }

        .nav-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
        }

        .logo {
            font-size: 1.7rem;
            font-weight: 900;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .logo span { color: var(--dark); }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 30px;
        }

        .nav-link {
            color: var(--dark);
            font-weight: 500;
            font-size: 0.95rem;
            transition: 0.3s;
            position: relative;
        }

        .nav-link:hover { color: var(--primary); }

        .btn-wa {
            background: var(--whatsapp);
            color: white !important;
            padding: 10px 22px;
            border-radius: 50px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 15px rgba(37, 211, 102, 0.3);
        }

        .btn-wa:hover {
            background: var(--whatsapp-dark);
            transform: scale(1.05);
        }

        /* ===== HERO SECTION ===== */
        .hero {
            height: 100vh;
            background: linear-gradient(135deg, rgba(30, 39, 46, 0.85), rgba(255, 71, 87, 0.3)),
                url('https://images.unsplash.com/photo-1512058564366-18510be2db19?w=1920');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: white;
            padding-top: 80px;
        }

        .hero-content {
            max-width: 850px;
            animation: fadeInUp 1s ease;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .hero-subtitle {
            font-size: 1.1rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 15px;
            color: var(--secondary);
        }

        .hero-title {
            font-size: 4.2rem;
            font-weight: 900;
            line-height: 1.1;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        .hero-title span {
            color: var(--secondary);
        }

        .hero-desc {
            font-size: 1.2rem;
            margin-bottom: 35px;
            opacity: 0.9;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        .hero-buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        /* ===== FEATURES BAR ===== */
        .features-bar {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            padding: 40px 0;
            margin-top: -60px;
            position: relative;
            z-index: 10;
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(255, 71, 87, 0.3);
        }

        .features-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
        }

        .feature-item {
            text-align: center;
            color: white;
            padding: 10px;
        }

        .feature-item i {
            font-size: 2.2rem;
            margin-bottom: 10px;
        }

        .feature-item h4 {
            font-weight: 600;
            font-size: 1rem;
        }

        /* ===== SECTIONS ===== */
        .section {
            padding: 90px 0;
        }

        .section-header {
            text-align: center;
            margin-bottom: 50px;
        }

        .section-header h2 {
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--dark);
            margin-bottom: 12px;
        }

        .section-header p {
            font-size: 1.1rem;
            color: var(--gray);
        }

        .divider {
            width: 70px;
            height: 4px;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            margin: 15px auto;
            border-radius: 2px;
        }

        /* ===== ABOUT SECTION ===== */
        .about-section {
            background: var(--white);
        }

        .about-wrapper {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 60px;
            align-items: center;
        }

        .about-image {
            position: relative;
        }

        .about-image img {
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.15);
        }

        .about-image::before {
            content: '';
            position: absolute;
            top: -25px;
            left: -25px;
            width: 100%;
            height: 100%;
            border: 4px solid var(--primary);
            border-radius: 20px;
            z-index: -1;
        }

        .about-content h3 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 15px;
            color: var(--primary);
        }

        .about-content > p {
            color: var(--gray);
            margin-bottom: 25px;
            font-size: 1.05rem;
        }

        .about-list {
            list-style: none;
            margin-bottom: 30px;
        }

        .about-list li {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 15px;
            font-weight: 500;
            font-size: 1rem;
        }

        .about-list li i {
            width: 28px;
            height: 28px;
            background: var(--primary);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
        }

        .about-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            padding-top: 25px;
            border-top: 2px solid var(--light);
        }

        .stat-item {
            text-align: center;
        }

        .stat-item h2 {
            font-size: 2rem;
            font-weight: 800;
            color: var(--primary);
        }

        .stat-item p {
            font-size: 0.9rem;
            color: var(--gray);
        }

        /* ===== MENU SECTION ===== */
        .menu-section {
            background: var(--off-white);
        }

        .menu-categories {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        .category-btn {
            background: var(--white);
            border: 2px solid var(--light);
            padding: 10px 25px;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            font-size: 0.95rem;
        }

        .category-btn.active,
        .category-btn:hover {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
            gap: 30px;
        }

        .menu-card {
            background: var(--white);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            transition: all 0.3s ease;
        }

        .menu-card:hover {
            transform: translateY(-12px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
        }

        .menu-image {
            position: relative;
            overflow: hidden;
        }

        .menu-image img {
            width: 100%;
            height: 240px;
            object-fit: cover;
            transition: 0.4s;
        }

        .menu-card:hover .menu-image img {
            transform: scale(1.1);
        }

        .menu-badge {
            position: absolute;
            top: 15px;
            left: 15px;
            background: var(--secondary);
            color: white;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .menu-badge.popular {
            background: var(--primary);
        }

        .menu-body {
            padding: 25px;
        }

        .menu-title {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .menu-desc {
            font-size: 0.9rem;
            color: var(--gray);
            margin-bottom: 18px;
            line-height: 1.6;
        }

        .menu-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 18px;
            border-top: 1px solid var(--light);
        }

        .menu-price {
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--primary);
        }

        .menu-price span {
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--gray);
            text-decoration: line-through;
            margin-left: 5px;
        }

        .btn-order {
            background: var(--whatsapp);
            color: white;
            padding: 12px 22px;
            border-radius: 10px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.3s;
        }

        .btn-order:hover {
            background: var(--whatsapp-dark);
            transform: scale(1.05);
        }

        /* ===== TESTIMONIALS ===== */
        .testimonials {
            background: var(--white);
        }

        .testimonial-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 30px;
        }

        .testimonial-card {
            background: var(--off-white);
            padding: 30px;
            border-radius: 20px;
            position: relative;
        }

        .testimonial-card::before {
            content: '\201C';
            font-size: 5rem;
            color: var(--primary);
            opacity: 0.15;
            position: absolute;
            top: 5px;
            left: 20px;
            font-family: serif;
            line-height: 1;
        }

        .testimonial-text {
            font-style: italic;
            margin-bottom: 20px;
            position: relative;
            z-index: 1;
            color: var(--gray);
        }

        .testimonial-author {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .author-img {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            object-fit: cover;
        }

        .author-info h4 {
            font-weight: 600;
            font-size: 1rem;
        }

        .author-info p {
            font-size: 0.85rem;
            color: var(--gray);
        }

        .rating {
            color: var(--secondary);
            font-size: 0.9rem;
            margin-top: 3px;
        }

        /* ===== CONTACT SECTION ===== */
        .contact-section {
            background: linear-gradient(rgba(30, 39, 46, 0.92), rgba(30, 39, 46, 0.92)),
                url('https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?w=1920');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: white;
        }

        .contact-section .section-header h2,
        .contact-section .section-header p {
            color: white;
        }

        .contact-wrapper {
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            gap: 50px;
        }

        .contact-info-boxes {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 35px;
        }

        .info-box {
            background: rgba(255,255,255,0.08);
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            transition: 0.3s;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .info-box:hover {
            background: var(--primary);
            border-color: var(--primary);
        }

        .info-box i {
            font-size: 2rem;
            margin-bottom: 12px;
            color: var(--secondary);
        }

        .info-box h4 {
            font-size: 1.1rem;
            margin-bottom: 8px;
        }

        .info-box p {
            font-size: 0.95rem;
            opacity: 0.9;
            line-height: 1.5;
        }

        .social-section h4 {
            margin-bottom: 15px;
        }

        .social-icons {
            display: flex;
            gap: 12px;
        }

        .social-icon {
            width: 50px;
            height: 50px;
            background: rgba(255,255
