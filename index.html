<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lagos Vibes Kitchen | Best Nigerian Restaurant</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* =========================================
           CSS VARIABLES & GLOBAL STYLES
           ========================================= */
        :root {
            --primary: #ff4757;        /* Merah menyala */
            --primary-dark: #e84118;
            --secondary: #ffa502;     /* Oranye */
            --dark: #1e272e;
            --dark-light: #2f3542;
            --light: #f1f2f6;
            --white: #ffffff;
            --gray: #a4b0be;
            --whatsapp: #25D366;
            --whatsapp-dark: #128c7e;
            --success: #2ed573;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: var(--light);
            color: var(--dark);
            overflow-x: hidden;
        }

        html {
            scroll-behavior: smooth;
        }

        a { text-decoration: none; }
        
        ul { list-style: none; }
        
        img { max-width: 100%; display: block; }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .section-padding {
            padding: 80px 0;
        }

        .section-title {
            text-align: center;
            margin-bottom: 50px;
        }

        .section-title h2 {
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--dark);
            margin-bottom: 10px;
        }

        .section-title p {
            font-size: 1.1rem;
            color: var(--gray);
        }

        .divider {
            width: 60px;
            height: 4px;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            margin: 15px auto;
            border-radius: 2px;
        }

        /* =========================================
           NAVBAR
           ========================================= */
        .navbar {
            background: var(--white);
            box-shadow: 0 2px 20px rgba(0,0,0,0.08);
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
            transition: 0.3s;
        }

        .navbar.scrolled {
            padding: 10px 0;
        }

        .nav-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 900;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo span {
            color: var(--dark);
        }

        .nav-menu {
            display: flex;
            align-items: center;
            gap: 30px;
        }

        .nav-link {
            font-weight: 500;
            color: var(--dark);
            transition: 0.3s;
            position: relative;
        }

        .nav-link:hover {
            color: var(--primary);
        }

        .btn-whatsapp {
            background: var(--whatsapp);
            color: white !important;
            padding: 12px 25px;
            border-radius: 50px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(37, 211, 102, 0.3);
        }

        .btn-whatsapp:hover {
            background: var(--whatsapp-dark);
            transform: translateY(-2px);
        }

        /* Mobile Menu Toggle */
        .menu-toggle {
            display: none;
            font-size: 1.5rem;
            cursor: pointer;
        }

        /* =========================================
           HERO SECTION
           ========================================= */
        .hero {
            height: 100vh;
            background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)),
                url('https://images.unsplash.com/photo-1512058564366-18510be2db19?ixlib=rb-1.2.1&auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: var(--white);
            padding-top: 80px;
        }

        .hero-content {
            max-width: 800px;
            animation: fadeInUp 1s ease;
        }

        .hero-subtitle {
            font-size: 1.2rem;
            font-weight: 500;
            color: var(--secondary);
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 15px;
        }

        .hero-title {
            font-size: 4rem;
            font-weight: 900;
            line-height: 1.1;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        .hero-title span {
            color: var(--primary);
        }

        .hero-desc {
            font-size: 1.2rem;
            margin-bottom: 40px;
            opacity: 0.9;
        }

        .hero-buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            padding: 15px 35px;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: 0.3s;
            border: none;
            cursor: pointer;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(255, 71, 87, 0.4);
        }

        .btn-outline {
            background: transparent;
            color: white;
            padding: 15px 35px;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 600;
            border: 2px solid white;
            transition: 0.3s;
        }

        .btn-outline:hover {
            background: white;
            color: var(--dark);
        }

        /* =========================================
           FEATURES BAR
           ========================================= */
        .features-bar {
            background: var(--primary);
            padding: 30px 0;
            margin-top: -50px;
            position: relative;
            z-index: 10;
        }

        .features-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
        }

        .feature-item {
            text-align: center;
            color: white;
        }

        .feature-item i {
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .feature-item h4 {
            font-weight: 600;
        }

        /* =========================================
           ABOUT SECTION
           ========================================= */
        .about {
            background: var(--white);
        }

        .about-wrapper {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 50px;
            align-items: center;
        }

        .about-image {
            position: relative;
        }

        .about-image img {
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.15);
        }

        .about-image::before {
            content: '';
            position: absolute;
            top: -20px;
            left: -20px;
            width: 100%;
            height: 100%;
            border: 4px solid var(--primary);
            border-radius: 20px;
            z-index: -1;
        }

        .about-content h3 {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 15px;
            color: var(--primary);
        }

        .about-content p {
            font-size: 1rem;
            line-height: 1.8;
            color: var(--gray);
            margin-bottom: 25px;
        }

        .about-list {
            margin-bottom: 30px;
        }

        .about-list li {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 15px;
            font-weight: 500;
        }

        .about-list li i {
            color: var(--success);
            font-size: 1.1rem;
        }

        .about-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-top: 30px;
            padding-top: 30px;
            border-top: 1px solid #eee;
        }

        .stat-item {
            text-align: center;
        }

        .stat-item h2 {
            font-size: 2rem;
            color: var(--primary);
            font-weight: 800;
        }

        .stat-item p {
            font-size: 0.9rem;
            color: var(--gray);
            margin: 0;
        }

        /* =========================================
           MENU / PRODUCTS SECTION
           ========================================= */
        .menu-section {
            background: var(--light);
        }

        /* Category Filter */
        .menu-categories {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        .category-btn {
            background: var(--white);
            border: 2px solid #ddd;
            padding: 10px 25px;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            font-size: 0.95rem;
        }

        .category-btn.active,
        .category-btn:hover {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 30px;
        }

        .menu-card {
            background: var(--white);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            transition: 0.3s;
        }

        .menu-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
        }

        .menu-image {
            position: relative;
            overflow: hidden;
        }

        .menu-image img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            transition: 0.3s;
        }

        .menu-card:hover .menu-image img {
            transform: scale(1.1);
        }

        .menu-badge {
            position: absolute;
            top: 15px;
            left: 15px;
            background: var(--secondary);
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .menu-body {
            padding: 25px;
        }

        .menu-title {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .menu-desc {
            font-size: 0.9rem;
            color: var(--gray);
            margin-bottom: 15px;
            line-height: 1.6;
        }

        .menu-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 15px;
            border-top: 1px solid #eee;
        }

        .menu-price {
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--primary);
        }

        .btn-order {
            background: var(--whatsapp);
            color: white;
            padding: 12px 20px;
            border-radius: 10px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.3s;
            font-size: 0.95rem;
        }

        .btn-order:hover {
            background: var(--whatsapp-dark);
        }

        /* =========================================
           TESTIMONIALS
           ========================================= */
        .testimonials {
            background: var(--white);
        }

        .testimonial-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 30px;
        }

        .testimonial-card {
            background: var(--light);
            padding: 30px;
            border-radius: 20px;
            position: relative;
        }

        .testimonial-card::before {
            content: '\201C';
            font-size: 5rem;
            color: var(--primary);
            opacity: 0.2;
            position: absolute;
            top: 10px;
            left: 20px;
            font-family: serif;
        }

        .testimonial-text {
            font-style: italic;
            margin-bottom: 20px;
            position: relative;
            z-index: 1;
        }

        .testimonial-author {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .author-img {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            object-fit: cover;
        }

        .author-info h4 {
            font-weight: 600;
            font-size: 1rem;
        }

        .author-info p {
            font-size: 0.85rem;
            color: var(--gray);
        }

        /* =========================================
           CONTACT & INFO SECTION
           ========================================= */
        .contact-section {
            background: linear-gradient(rgba(30, 39, 46, 0.95), rgba(30, 39, 46, 0.95)),
                url('https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: white;
        }

        .contact-section .section-title h2,
        .contact-section .section-title p {
            color: white;
        }

        .contact-wrapper {
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 50px;
        }

        .contact-info-boxes {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 40px;
        }

        .info-box {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            transition: 0.3s;
        }

        .info-box:hover {
            background: var(--primary);
        }

        .info-box i {
            font-size: 2rem;
            margin-bottom: 15px;
            color: var(--secondary);
        }

        .info-box h4 {
            font-size: 1.1rem;
            margin-bottom: 8px;
        }

        .info-box p {
            font-size: 0.95rem;
            opacity: 0.9;
        }

        .social-media {
            margin-top: 30px;
        }

        .social-media h4 {
            margin-bottom: 15px;
        }

        .social-icons {
            display: flex;
            gap: 15px;
        }

        .social-icon {
            width: 50px;
            height: 50px;
            background: rgba(255,255,255,0.1);
            display: flex;
            align-items: center
